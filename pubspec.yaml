name: ishim_native_callkit
description: I-SHIM icin native iOS CallKit + PushKit handler (WhatsApp modeli)
version: 1.0.0

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.0.0'

dependencies:
  flutter:
    sdk: flutter

flutter:
  plugin:
    platforms:
      ios:
        pluginClass: SwiftIshimCallkitPlugin
      android:
        package: com.levent.ishim.callkit
        pluginClass: IshimNativeCallkitPlugin
